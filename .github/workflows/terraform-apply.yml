name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'
      - 'pipelines/**'
      - '.github/workflows/terraform-plan.yml'
      - '.github/workflows/terraform-apply.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-west-2
      TF_WORKING_DIR: infra/terraform/envs/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipelines/digital_twin_resilience/requirements.txt

      - name: Generate SageMaker pipeline definition
        run: |
          python pipelines/digital_twin_resilience/pipeline.py
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_EXECUTION_ROLE_ARN }}
          DEFAULT_BUCKET: ${{ secrets.SAGEMAKER_DEFAULT_BUCKET }}
          PIPELINE_NAME: digital-twin-resilience-dev-pipeline

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve
