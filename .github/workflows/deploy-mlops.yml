name: Deploy MLOps PoC

on:
  push:
    branches:
      - main
    paths:
      - 'mlops/**'
      - '.github/workflows/deploy-mlops.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-west-2
      STACK_NAME: mlops-poc
      SAM_TEMPLATE: mlops/infra/template.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM build
        run: sam build --template-file $SAM_TEMPLATE

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              InputBucketName=dougdaly-mlops-poc-input-dev \
              OutputBucketName=dougdaly-mlops-poc-output-dev
      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --query "Stacks[0].Outputs" \
            --output table
