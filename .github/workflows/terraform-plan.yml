name: Terraform Plan
 
on:
  pull_request:
    paths:
      - 'mlops/infra/terraform/**'
      - 'mlops/pipelines/**'
      - '.github/workflows/terraform-plan.yml'
      - '.github/workflows/terraform-apply.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-west-2
      TF_WORKING_DIR: mlops/infra/terraform/envs/dev
      PIPELINE_MODE: stub
      PIPELINE_NAME: digital-twin-resilience-dev-pipeline
      LLM_PROVIDER: openai
      PROCESSING_INSTANCE_TYPE_DEFAULT: ml.t3.medium
      TRAINING_INSTANCE_TYPE_DEFAULT: ml.t3.medium
      EVALUATION_INSTANCE_TYPE_DEFAULT: ml.t3.medium

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mlops/pipelines/digital_twin_resilience/requirements.txt

      - name: Generate SageMaker pipeline definition
        run: |
          python mlops/pipelines/digital_twin_resilience/pipeline.py
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_EXECUTION_ROLE_ARN }}
          INPUT_BUCKET: ${{ vars.INPUT_BUCKET }}
          OUTPUT_BUCKET: ${{ vars.OUTPUT_BUCKET }}
          PIPELINE_NAME: ${{ env.PIPELINE_NAME }}
          PIPELINE_MODE: ${{ env.PIPELINE_MODE }}
          LLM_PROVIDER: ${{ env.LLM_PROVIDER }}
          PROCESSING_INSTANCE_TYPE_DEFAULT: ${{ env.PROCESSING_INSTANCE_TYPE_DEFAULT }}
          TRAINING_INSTANCE_TYPE_DEFAULT: ${{ env.TRAINING_INSTANCE_TYPE_DEFAULT }}
          EVALUATION_INSTANCE_TYPE_DEFAULT: ${{ env.EVALUATION_INSTANCE_TYPE_DEFAULT }}

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
